<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta
      name="description"
      content="A minimal, web-based reaction time game built with Zig and WebAssembly."
    />
    <title>pureReaction</title>
    <link rel="icon" href="data:," />
    <link
      rel="preload"
      href="reaction.wasm?v=2"
      as="fetch"
      type="application/wasm"
      crossorigin
      fetchpriority="high"
    />
    <style>
      :root {
        --bg: #0b0c0f;
        --surface: #15171c;
        --surface-2: #1c1f26;
        --border: #262a31;
        --border-2: #343943;
        --text: #e8eaed;
        --muted: #9aa0a8;
        --faint: #555b64;
        --accent: #00ff66;
        --warn: #9d7cff;
        --danger: #f85149;
      }
      html,
      body {
        height: 100vh;
        height: 100dvh;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Monaco,
          "Courier New", monospace;
        touch-action: none;
      }
      #wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        height: 100dvh;
        gap: 14px;
        position: relative;
        box-sizing: border-box;
        overflow: hidden;
      }
      canvas {
        image-rendering: pixelated;
        box-shadow: 0 0 0 1px var(--border);
        border-radius: 6px;
        touch-action: none;
        max-width: 100%;
        max-height: 100%;
        contain: strict;
        will-change: transform;
        transform: translateZ(0);
      }
      canvas.waiting {
        box-shadow: 0 0 0 2px #c80050;
      }
      #status {
        height: 16px;
        font-size: 12px;
        letter-spacing: 0.08em;
        color: var(--muted);
        contain: content;
      }
      #status .pb {
        color: var(--faint);
      }
      #overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 20;
        background: rgba(11, 12, 15, 0.55);
        content-visibility: auto;
      }
      #overlay.show {
        display: flex;
        animation: fade 0.18s ease-out;
      }
      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      #panel {
        background: var(--surface);
        color: var(--text);
        padding: 20px 24px;
        border: 1px solid var(--border);
        border-radius: 10px;
        min-width: 300px;
        max-width: min(92vw, 420px);
        text-align: center;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      }
      #panel h2 {
        margin: 0 0 4px 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }
      #headline {
        font-size: 36px;
        font-weight: 700;
        color: var(--warn);
        margin: 6px 0 2px;
        font-variant-numeric: tabular-nums;
      }
      #headline span {
        font-size: 16px;
        color: var(--muted);
        font-weight: 400;
      }
      #pb-line {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 12px;
        min-height: 14px;
      }
      #pb-line .up {
        color: var(--accent);
      }
      #stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        margin: 0 0 12px;
      }
      #stats div {
        background: var(--surface-2);
        padding: 8px 6px;
      }
      #stats .k {
        display: block;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--faint);
        margin-bottom: 2px;
      }
      #stats .v {
        font-size: 16px;
        font-variant-numeric: tabular-nums;
      }
      #bars {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin: 0 0 14px;
        max-height: 130px;
        overflow-y: auto;
        text-align: left;
      }
      .bar-row {
        display: grid;
        grid-template-columns: 22px 1fr 48px;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .bar-row .n {
        text-align: right;
        color: var(--faint);
      }
      .bar-row .ms {
        text-align: right;
      }
      .bar-track {
        height: 6px;
        border-radius: 3px;
        background: var(--border);
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 3px;
        background: var(--border-2);
      }
      .bar-row.best .bar-fill {
        background: var(--accent);
      }
      .bar-row.best .ms {
        color: var(--accent);
      }
      .bar-row.worst .bar-fill {
        background: #c80050;
      }
      #bars-note {
        font-size: 11px;
        color: var(--faint);
        margin: -8px 0 12px;
      }
      #panel button {
        width: 100%;
        padding: 9px 12px;
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border-2);
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 0.06em;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      #panel button:hover {
        background: #232730;
        border-color: #454c58;
      }
      #panel button:active {
        background: #2a2f3a;
      }
      #hint {
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.04em;
      }
      #controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }
      #controls .row {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        align-items: center;
      }
      #controls label {
        color: var(--faint);
        letter-spacing: 0.04em;
      }
      #controls select,
      #controls input {
        padding: 5px 8px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: inherit;
        font-size: 13px;
      }
      #controls select:focus-visible,
      #controls input:focus-visible {
        outline: 1px solid var(--border-2);
      }
      #controls input {
        width: 72px;
      }
      #controls select:disabled,
      #controls input:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
      }
      #custom-controls {
        gap: 6px;
        align-items: center;
      }
      #custom-controls:not([hidden]) {
        display: flex;
      }
      .error-hint {
        color: var(--danger);
        font-size: 12px;
        margin-top: -4px;
      }
      #brand {
        position: absolute;
        top: 22px;
        left: 24px;
        z-index: 10;
        font-size: 14px;
        letter-spacing: 0.06em;
        color: var(--muted);
      }
      #brand b {
        color: var(--text);
        font-weight: 600;
      }
      #header-icons {
        position: absolute;
        top: 20px;
        right: 24px;
        display: flex;
        gap: 12px;
        z-index: 10;
      }
      #header-icons a {
        color: var(--faint);
        transition: color 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #header-icons a:hover {
        color: var(--text);
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        z-index: 30;
        transition: opacity 0.3s;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #loading span {
        color: var(--faint);
        font-size: 14px;
      }
      #footer {
        position: absolute;
        bottom: 12px;
        left: 0;
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: #3a3f47;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #footer a {
        color: var(--faint);
        text-decoration: none;
        pointer-events: auto;
        transition: color 0.15s;
      }
      #footer a:hover {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="loading"><span>Loading…</span></div>
    <div id="wrap">
      <div id="brand"><b>pure</b>Reaction</div>
      <div id="header-icons">
        <a href="https://x.com/kryoxd" target="_blank" aria-label="X">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4 4l11.733 16h4.267l-11.733 -16z" />
            <path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772" />
          </svg>
        </a>
      </div>
      <canvas id="canvas" width="480" height="270"></canvas>
      <div id="status"></div>
      <div id="controls">
        <span id="hint">click / space to react &middot; r to reset</span>
        <div class="row">
          <label for="trial-count">trials per session</label>
          <select id="trial-count">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="custom">Custom…</option>
          </select>
          <div id="custom-controls" hidden>
            <input
              id="trial-custom"
              type="number"
              min="1"
              max="999999"
              step="1"
              value="5"
              aria-label="Custom trials"
            />
          </div>
        </div>
        <span id="custom-error" class="error-hint" hidden></span>
      </div>
      <div id="overlay">
        <div id="panel">
          <h2 id="resultsTitle">Session &middot; 5 trials</h2>
          <div id="headline">- <span>ms avg</span></div>
          <div id="pb-line"></div>
          <div id="stats">
            <div><span class="k">average</span><span class="v" id="avg">-</span></div>
            <div><span class="k">median</span><span class="v" id="med">-</span></div>
            <div><span class="k">fastest</span><span class="v" id="fast">-</span></div>
            <div><span class="k">slowest</span><span class="v" id="slow">-</span></div>
          </div>
          <div id="bars"></div>
          <div id="bars-note" hidden></div>
          <button id="reset">go again (r)</button>
        </div>
      </div>
      <div id="footer">
        <div>
          developed by <a href="https://kryo.dev" target="_blank">kryo</a>
        </div>
        <div>&copy; 2026 pureReaction</div>
      </div>
    </div>
    <script>
      const canvas = document.getElementById("canvas");
      let offscreen;
      let worker;
      let stateBuffer = null;
      let stateView = null;
      const overlay = document.getElementById("overlay");
      const avgEl = document.getElementById("avg");
      const medEl = document.getElementById("med");
      const fastEl = document.getElementById("fast");
      const slowEl = document.getElementById("slow");
      const headlineEl = document.getElementById("headline");
      const pbLineEl = document.getElementById("pb-line");
      const barsEl = document.getElementById("bars");
      const barsNoteEl = document.getElementById("bars-note");
      const statusEl = document.getElementById("status");
      const resetBtn = document.getElementById("reset");
      const trialSelect = document.getElementById("trial-count");
      const trialCustom = document.getElementById("trial-custom");
      const customControls = document.getElementById("custom-controls");

      const customError = document.getElementById("custom-error");
      const resultsTitle = document.getElementById("resultsTitle");

      const STATE_COLORS = [
        "#0040c0",
        "#C80050",
        "#00ff66",
        "#1c1f26",
        "#7a0c2e",
      ];

      const LS_KEY = "pureReaction.v1";
      let store = { bestFast: 0, bestAvg: 0, sessions: [] };
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === "object") {
            store.bestFast = +parsed.bestFast || 0;
            store.bestAvg = +parsed.bestAvg || 0;
            store.sessions = Array.isArray(parsed.sessions)
              ? parsed.sessions.slice(-10)
              : [];
          }
        }
      } catch (_) {}
      function saveStore() {
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(store));
        } catch (_) {}
      }

      function resizeCanvas() {
        const w = window.innerWidth - 32;
        const h = window.innerHeight - 270;
        canvas.style.width = w + "px";
        canvas.style.height = Math.max(h, 240) + "px";
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      async function loadWasm() {
        if (self.__WASM_B64) {
          const b = atob(self.__WASM_B64);
          const bytes = new Uint8Array(b.length);
          for (let i = 0; i < b.length; i++) bytes[i] = b.charCodeAt(i);
          const { instance } = await WebAssembly.instantiate(bytes, {});
          return instance;
        }
        if (WebAssembly.instantiateStreaming) {
          const { instance } = await WebAssembly.instantiateStreaming(
            fetch("reaction.wasm?v=2"),
            {},
          );
          return instance;
        } else {
          const response = await fetch("reaction.wasm?v=2");
          const bytes = await response.arrayBuffer();
          const { instance } = await WebAssembly.instantiate(bytes, {});
          return instance;
        }
      }

      const wasmPromise = loadWasm();

      (async () => {
        const wasm = await wasmPromise;
        const exp = wasm.exports;
        let isLoaded = false;
        const rect = canvas.getBoundingClientRect();
        let W = Math.floor(rect.width) || 480;
        let H = Math.floor(rect.height) || 270;
        canvas.width = W;
        canvas.height = H;
        exp.init(W, H);

        let resizeTimeout;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(() => {
            const rect = canvas.getBoundingClientRect();
            W = Math.floor(rect.width);
            H = Math.floor(rect.height);

            if (useWorker) {
              worker.postMessage({
                type: "resize",
                size: { W, H },
                state: exp.get_state(),
                ms: exp.get_last_reaction_ms(),
              });
            } else {
              canvas.width = W;
              canvas.height = H;
              if (ctx) {
                ctx.imageSmoothingEnabled = false;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "24px monospace";
              }
              prevState = -1;
            }
          }, 50);
        });

        function seedRng() {
          if (exp.seed_rng && crypto.getRandomValues) {
            const buf = new Uint32Array(2);
            crypto.getRandomValues(buf);
            const seed = (BigInt(buf[0]) << 32n) | BigInt(buf[1]);
            exp.seed_rng(seed);
          }
        }
        seedRng();

        let useWorker = false;
        let ctx = canvas.getContext("2d", {
          alpha: true,
          desynchronized: true,
          willReadFrequently: false,
        });
        ctx.imageSmoothingEnabled = false;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "24px monospace";
        canvas.style.backgroundColor = STATE_COLORS[0];
        ctx.fillStyle = "#ffffff";
        ctx.fillText("click to begin", W >> 1, H >> 1);

        try {
          stateBuffer = new SharedArrayBuffer(8);
          stateView = new Uint32Array(stateBuffer);
          offscreen = canvas.transferControlToOffscreen();
          worker = new Worker(
            self.__WORKER_SRC
              ? URL.createObjectURL(
                  new Blob([self.__WORKER_SRC], { type: "text/javascript" }),
                )
              : "worker.js?v=2",
            { type: "module" },
          );
          worker.onmessage = (e) => {
            if (e.data.type === "onset") {
              readyAt = e.data.abs - performance.timeOrigin;
              isReady = true;
              if (trialPending) {
                trialPending = false;
                recordTrial();
              }
            }
          };
          worker.postMessage(
            {
              type: "init",
              canvas: offscreen,
              size: { W, H },
              stateBuffer,
              colors: STATE_COLORS,
            },
            [offscreen],
          );
          useWorker = true;
          ctx = null;
        } catch (err) {
          useWorker = false;
          stateBuffer = null;
          stateView = null;
        }

        let prevState = -1;
        let readyAt = 0;
        let clickedAt = 0;
        let isReady = false;
        let rebasePending = false;
        let trialPending = false;
        let trialPendingSince = 0;
        const trials = [];
        let sessionOver = false;
        let trialGoal = parseInt(trialSelect.value, 10);
        let lastCustomValue = Math.max(1, parseInt(trialCustom.value, 10) || 5);

        if (Number.isNaN(trialGoal)) {
          trialGoal = lastCustomValue;
          trialSelect.value = "custom";
          customControls.hidden = false;
        } else {
          customControls.hidden = trialSelect.value !== "custom";
        }

        const updateResultsTitle = () => {
          resultsTitle.textContent = "Session · " + trialGoal + " trials";
        };
        updateResultsTitle();

        function updateStatus() {
          let s = "";
          if (!sessionOver && trials.length > 0) {
            s = "trial " + trials.length + "/" + trialGoal;
          } else if (!sessionOver) {
            s = "trial 0/" + trialGoal;
          }
          if (store.bestFast > 0) {
            s +=
              (s ? "  ·  " : "") +
              "best " +
              Math.round(store.bestFast) +
              " ms";
          }
          statusEl.textContent = s;
        }
        updateStatus();

        function buildBars(arr, fast, slow) {
          if (arr.length > 60) {
            barsEl.innerHTML = "";
            barsNoteEl.textContent =
              arr.length + " trials — chart hidden for large sessions";
            barsNoteEl.hidden = false;
            return;
          }
          barsNoteEl.hidden = true;
          const max = slow || 1;
          let html = "";
          for (let i = 0; i < arr.length; i++) {
            const v = arr[i];
            const pct = Math.max(4, Math.round((v / max) * 100));
            let cls = "bar-row";
            if (v === fast) cls += " best";
            else if (v === slow && arr.length > 1) cls += " worst";
            html +=
              '<div class="' +
              cls +
              '"><span class="n">' +
              (i + 1) +
              '</span><div class="bar-track"><div class="bar-fill" style="width:' +
              pct +
              '%"></div></div><span class="ms">' +
              Math.round(v) +
              "</span></div>";
          }
          barsEl.innerHTML = html;
        }

        function showOverlay(a, m, f, s) {
          headlineEl.innerHTML =
            Math.round(a) + " <span>ms avg</span>";
          avgEl.textContent = Math.round(a) + " ms";
          medEl.textContent = Math.round(m) + " ms";
          fastEl.textContent = Math.round(f) + " ms";
          slowEl.textContent = Math.round(s) + " ms";
          buildBars(trials, f, s);

          let pb = "";
          if (store.bestFast === 0 || f < store.bestFast) {
            const prev = store.bestFast;
            store.bestFast = f;
            pb = prev
              ? '<span class="up">new best ' +
                Math.round(f) +
                " ms (−" +
                Math.round(prev - f) +
                " ms)</span>"
              : '<span class="up">first personal best: ' +
                Math.round(f) +
                " ms</span>";
          } else {
            pb = "personal best " + Math.round(store.bestFast) + " ms";
          }
          if (store.bestAvg === 0 || a < store.bestAvg) store.bestAvg = a;
          store.sessions.push({ n: trials.length, avg: a, fast: f });
          store.sessions = store.sessions.slice(-10);
          const recent = store.sessions.slice(-5);
          if (recent.length > 1) {
            const rAvg =
              recent.reduce((acc, x) => acc + x.avg, 0) / recent.length;
            pb +=
              " · recent avg " + Math.round(rAvg) + " ms";
          }
          pbLineEl.innerHTML = pb;
          saveStore();

          overlay.classList.add("show");
          sessionOver = true;
          updateStatus();
        }

        function hideOverlay() {
          overlay.classList.remove("show");
        }

        function computeStats(arr) {
          if (arr.length === 0) return { avg: 0, med: 0, fast: 0, slow: 0 };
          const sum = arr.reduce((a, b) => a + b, 0);
          const avg = sum / arr.length;
          const sorted = arr.slice().sort((a, b) => a - b);
          const mid = sorted.length >> 1;
          const med =
            sorted.length % 2
              ? sorted[mid]
              : (sorted[mid - 1] + sorted[mid]) / 2;
          return { avg, med, fast: sorted[0], slow: sorted[sorted.length - 1] };
        }
        function paint(ctx, W, H, s, repaint, ms) {
          if (repaint) {
            ctx.clearRect(0, 0, W, H);
          }

          switch (s) {
            case 3: {
              ctx.fillStyle = "#9d7cff";
              ctx.font = "40px monospace";
              ctx.fillText(ms + " ms", W >> 1, H >> 1);
              ctx.font = "20px monospace";
              ctx.fillStyle = "#ffffff";
              ctx.fillText("click for next trial", W >> 1, (H >> 1) + 40);
              break;
            }
            case 0:
              ctx.font = "24px monospace";
              ctx.fillStyle = "#ffffff";
              ctx.fillText("click to begin", W >> 1, H >> 1);
              break;
            case 4:
              ctx.font = "24px monospace";
              ctx.fillStyle = "#ffffff";
              ctx.fillText("too soon — click to retry", W >> 1, H >> 1);
              break;
          }
        }
        function measuredMs() {
          return clickedAt > 0 && readyAt > 0
            ? Math.max(0, clickedAt - readyAt)
            : exp.get_last_reaction_ms();
        }

        function recordTrial() {
          trials.push(measuredMs());
          updateStatus();
          if (trials.length === trialGoal) {
            const { avg, med, fast, slow } = computeStats(trials);
            showOverlay(avg, med, fast, slow);
          }
        }

        function syncState(now) {
          const s = exp.get_state();
          if (s === prevState) return;
          const from = prevState;
          prevState = s;

          if (s === 1) {
            clickedAt = 0;
            readyAt = 0;
            isReady = false;
            if (useWorker) {
              worker.postMessage({
                type: "arm",
                deadlineAbs:
                  performance.timeOrigin + exp.get_ready_deadline_ms(),
              });
            }
          } else if (s === 2) {
            isReady = true;
            if (!useWorker) {
              readyAt = now;
              rebasePending = true;
            }
          } else if (from === 2) {
            isReady = false;
            rebasePending = false;
          }

          if (!sessionOver && s === 3 && from !== 3) {
            if (useWorker && clickedAt > 0 && readyAt === 0) {
              trialPending = true;
              trialPendingSince = performance.now();
            } else {
              recordTrial();
            }
          }

          canvas.classList.toggle("waiting", s === 1);
          const ms = Math.round(measuredMs());
          if (useWorker && stateView) {
            Atomics.store(stateView, 1, ms);
            Atomics.store(stateView, 0, s);
          } else if (ctx) {
            canvas.style.backgroundColor = STATE_COLORS[s] || STATE_COLORS[0];
            paint(ctx, W, H, s, true, ms);
          }
        }

        function frame(now) {
          if (!useWorker && rebasePending) {
            rebasePending = false;
            if (clickedAt === 0 && exp.get_state() === 2) {
              readyAt = now;
              exp.rebase_ready(now | 0);
            }
          }

          if (trialPending && now - trialPendingSince > 150) {
            trialPending = false;
            recordTrial();
          }

          exp.update(now | 0);
          syncState(now);

          requestAnimationFrame(frame);
        }

        let pointerDown = false;
        const resetSession = () => {
          pointerDown = false;
          trialSelect.disabled = false;
          trialCustom.disabled = false;
          trials.length = 0;
          sessionOver = false;
          clickedAt = 0;
          readyAt = 0;
          isReady = false;
          rebasePending = false;
          trialPending = false;
          prevState = -1;
          hideOverlay();
          canvas.classList.remove("waiting");
          exp.on_action(0);
          exp.reset();
          seedRng();
          canvas.style.backgroundColor = STATE_COLORS[0];
          if (useWorker && stateView) {
            Atomics.store(stateView, 0, exp.get_state());
            Atomics.store(stateView, 1, 0);
          } else if (ctx) {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = "#ffffff";
            ctx.font = "24px monospace";
            ctx.fillText("click to begin", W >> 1, H >> 1);
          }
          updateResultsTitle();
          updateStatus();
        };
        const press = (ts) => {
          if (!isLoaded || sessionOver || pointerDown) return;

          if (exp.get_state() === 0) {
            if (trialSelect.value === "custom") {
              const validated = validateCustomTrials();
              if (validated === null) return;
              trialGoal = validated;
              lastCustomValue = validated;
              updateResultsTitle();
            }
            trialSelect.disabled = true;
            trialCustom.disabled = true;
            updateStatus();
          }

          const capturedTime =
            typeof ts === "number" && ts > 0 ? ts : performance.now();
          pointerDown = true;
          exp.update(capturedTime | 0);
          if (exp.get_state() === 2) {
            clickedAt = capturedTime;
          }
          exp.on_action(1);
          exp.update(capturedTime | 0);
          syncState(capturedTime);
        };
        const release = () => {
          if (sessionOver) return;
          pointerDown = false;
          exp.on_action(0);
        };

        window.addEventListener(
          "keydown",
          (e) => {
            if (e.code === "Space") {
              e.preventDefault();
              press(e.timeStamp);
            } else if (e.code === "KeyR") {
              e.preventDefault();
              resetSession();
            }
          },
          { capture: true, passive: false },
        );

        window.addEventListener(
          "keyup",
          (e) => {
            if (e.code === "Space") {
              release();
            }
          },
          { capture: true, passive: true },
        );

        canvas.addEventListener("contextmenu", (e) => e.preventDefault());

        const controls = document.getElementById("controls");
        const panel = document.getElementById("panel");

        window.addEventListener(
          "pointerdown",
          (e) => {
            if (
              controls.contains(e.target) ||
              panel.contains(e.target) ||
              e.target.closest("a")
            )
              return;
            if (e.button === 0) {
              e.preventDefault();
              if (e.target === canvas) {
                canvas.setPointerCapture(e.pointerId);
              }
              press(e.timeStamp);
            }
          },
          { capture: true, passive: false },
        );

        window.addEventListener(
          "pointerrawupdate",
          (e) => {
            if (!pointerDown && isReady && e.pressure > 0) {
              press(e.timeStamp);
            }
          },
          { capture: true, passive: true },
        );

        window.addEventListener(
          "pointerup",
          (e) => {
            if (e.button === 0) {
              e.preventDefault();
              if (canvas.hasPointerCapture(e.pointerId)) {
                canvas.releasePointerCapture(e.pointerId);
              }
              release();
            }
          },
          { capture: true, passive: false },
        );
        resetBtn.addEventListener("click", () => {
          resetSession();
        });

        function validateCustomTrials() {
          customError.hidden = true;
          const val = trialCustom.value;

          if (val === "") {
            customError.textContent = "Please enter a number";
            customError.hidden = false;
            return null;
          }

          const parsed = parseInt(val, 10);

          if (Number.isNaN(parsed)) {
            customError.textContent = "Must be a valid number";
            customError.hidden = false;
            return null;
          }

          if (parsed < 1) {
            customError.textContent = "Must be at least 1";
            customError.hidden = false;
            return null;
          }

          if (parsed > 999999) {
            customError.textContent = "Maximum is 999999";
            customError.hidden = false;
            return null;
          }

          return parsed;
        }

        trialSelect.addEventListener("change", () => {
          const sel = trialSelect.value;
          if (sel === "custom") {
            customControls.hidden = false;
            customError.hidden = true;
            trialCustom.value = lastCustomValue;
            trialGoal = lastCustomValue;
            updateResultsTitle();
            resetSession();
          } else {
            customControls.hidden = true;
            customError.hidden = true;
            const next = parseInt(sel, 10);
            if (Number.isNaN(next)) return;
            trialGoal = next;
            updateResultsTitle();
            resetSession();
          }
        });

        trialCustom.addEventListener("input", () => {
          customError.hidden = true;
        });

        isLoaded = true;
        document.getElementById("loading").classList.add("hidden");

        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
